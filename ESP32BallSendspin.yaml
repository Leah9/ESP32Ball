# Sendspin working on the ESP 32 S3 Ball.
# Thanks to config files from https://github.com/RealDeco and https://github.com/el-bakkali amongst others.


substitutions:
  name: esphome-web-22a5ac
  friendly_name: "Sphere 1"


  imagewidth: "240" # GC9A01A (Ball v2 & Muma & Puck) "240"
  imageheight: "240" # GC9A01A (Ball v2 & Muma & Puck) "240"
  displaymodel: "GC9A01A" # GC9A01A (Ball v2 & Puck) or ST7789V (Muma)
  invertcolors: "true" # GC9A01A/ST7789V (Ball v2 & Muma & Puck) "true"

  # Hardware v2 pin mappings
  sda_pin_bus_a: "15"        # I2C Bus A SDA
  scl_pin_bus_a: "14"        # I2C BUS A SCL
  sda_pin_bus_b: "11"        # I2C Bus B SDA
  scl_pin_bus_b: "7"         # I2C BUS B SCL

  i2s_lrclk_pin: "45"        # I2S LRCLK (Word Select)
  i2s_bclk_pin: "9"          # I2S BCLK (Bit Clock)
  i2s_mclk_pin: "16"         # I2S MCLK (Master Clock)
  i2s_din_pin: "10"          # I2S Data In (Mic)
  i2s_dout_pin: "8"          # I2S Data Out (Speaker)

  media_sample_rate: 48000

  speaker_enable_pin: "46"   # Speaker Enable
  touch_input_pin: "12"      # Touch interrupt
  touch_reset_pin: "6"       # Touch Reset

  backlight_output_pin: "42" # Display Backlight
  lcd_cs_pin: "5"            # Display CS (Chip Select)
  lcd_dc_pin: "47"           # Display DC (Data/Command)
  lcd_reset_pin: "38"        # Display Reset
  spi_clk_pin: "4"           # SPI Clock
  spi_mosi_pin: "2"          # SPI MOSI (Data Out)

  left_top_button_pin: "0"   # Main Button
  led_pin: "48"              # RGB LED (WS2812)
  battery_adc_pin: "1"       # Battery Voltage ADC

##################################################################################################################################################


  allowed_characters: " !#%'()+,-./0123456789:;<>?@ABCDEFGHIJKLMNOPQRSTUVWYZ[]_abcdefghijklmnopqrstuvwxyz{|}┬░┬▓┬│┬х┬┐├Ђ├ѓ├ё├Ё├Ѕ├ќ├џ├Ъ├а├А├б├Б├ц├Ц├д├Д├е├Е├ф├Ф├г├Г├«├░├▒├▓├│├┤├х├Х├И├╣├║├╗├╝├й├Й─Ђ─Ѓ─Ё─Є─Ї─Ј─љ─Љ─Њ─Ќ─Ў─Џ─Ъ─«─»─▒─╝─Й┼Ђ┼ѓ┼ё┼ѕ┼Љ┼Ў┼Џ┼А┼Ц┼Е┼Ф┼»┼▒┼│┼║┼╗┼╝┼й┼ЙкАк░╚Ў╚Џ╬є╬ѕ╬ї╬љ╬Љ╬њ╬Њ╬ћ╬Ћ╬ќ╬Ќ╬ў╬џ╬ю╬Ю╬а╬А╬Б╬ц╬Ц╬д╬г╬Г╬«╬»╬▒╬▓╬│╬┤╬х╬Х╬и╬И╬╣╬║╬╗╬╝╬й╬Й╬┐¤ђ¤Ђ¤ѓ¤Ѓ¤ё¤Ё¤є¤Є¤ѕ¤Ѕ¤і¤ї¤Ї¤јлљлЉлњлЊлћлЋлќлЌлўлџлЏлюлЮлълЪлалАлблБлЦлдлДлелфлГл«л»л░л▒л▓л│л┤лхлХлилИл╣л║л╗л╝лйлЙл┐ЛђЛЂЛѓЛЃЛёЛЁЛєЛЄЛѕЛЅЛіЛІЛїЛЇЛјЛЈЛЉЛњЛћЛќЛЌЛўЛЎЛџЛЏОљОЉОњОЊОћОЋОќОЌОўОЎОЏОюОЮОъОЪОаОАОбОцОЦОдОДОеОЕОфпїпАпбпБпЦпдпДпепЕпфпгпГп«п»п░п▒п▓п│п┤пхпХпипИп╣п║┘Ђ┘ѓ┘Ѓ┘ё┘Ё┘є┘Є┘ѕ┘Ѕ┘і┘╣┘Й┌є┌ѕ┌Е┌»┌║┌Й█Ђ█ї█њЯдѓЯдЋЯдџЯдцЯдДЯдеЯдФЯдгЯд»Яд░Яд▓ЯдХЯдиЯдИЯд╝ЯдЙЯд┐ЯДЂЯДЇЯ░џЯ░»Я░▓Я░┐Я▒єЯ▒іЯ▒ЇЯ┤ѓЯ┤ЁЯ┤єЯ┤ЄЯ┤ѕЯ┤ЅЯ┤јЯ┤ЊЯ┤ЋЯ┤ЌЯ┤ЎЯ┤џЯ┤юЯ┤ъЯ┤ЪЯ┤АЯ┤БЯ┤цЯ┤дЯ┤ДЯ┤еЯ┤фЯ┤ФЯ┤гЯ┤ГЯ┤«Я┤»Я┤░Я┤▒Я┤▓Я┤│Я┤хЯ┤ХЯ┤ИЯ┤╣Я┤ЙЯ┤┐ЯхђЯхЂЯхѓЯхєЯхЄЯхѕЯхЇЯх║Ях╗Ях╝ЯхйЯхЙрЃљрЃЉрЃњрЃЊрЃћрЃЋрЃќрЃЌрЃўрЃџрЃЏрЃюрЃЮрЃърЃарЃАрЃбрЃБрЃцрЃЦрЃДрЃерЃЕрЃфрЃФрЃГрЃ«р║Ар║Бр║Цр║Др║Ер║Гр║»р║ир║╣р║йр║┐р╗Ђр╗Ѓр╗Єр╗Ѕр╗Ір╗Їр╗Јр╗Љр╗Њр╗Ћр╗Ќр╗Ўр╗Џр╗Юр╗Ър╗Бр╗Цр╗Др╗Ер╗Фр╗Гр╗»р╗▒р╗│РђћсђЂСИђСИіСИЇСИфСИГСИ║СИ╗С╣ЙС║єС║ЏС║«С║║С╗╗СйјСйћСйЋСйюСЙЏСЙЮСЙДС┐ѓтђІтЂ┤тЂхтЁЁтЁЅтЁЦтЁетЁ│тєЄтєитЄатѕЄтѕ░тѕХтЅЇтІЋтЇђтЇДтјЁтјетЈітЈБтЈдтЈ│тљітљјтљЌтљ»тљИтЉђтњЌтЊфтћћтЋЈтЋЪтЌјтўЁтўЏтЎетюЇтюетю║тЪита┤тцќтцџтцДтДІт«Ѕт«џт«бт«цт«Хт»єт»хт»╣т░Єт░Јт░Љтидти▓тИўтИИт╣Фт╣Йт║Њт║дт║Фт╗іт╗џт╗│т╝ђт╝ЈтЙїТЂєТёЪТЁІТѕљТѕЉТѕ▓ТѕХТѕиТѕ┐ТЅђТЅЄТЅІТЅЊТЅДТііТІћТЇбТјЅТјДТЈњТЉёТЋ┤Тќ»Тќ░ТўјТў»ТЎ»ТџЌТЏ┤ТюђТюЃТюЅТюфТюгТеАТЕЪТф»ТФЃТгёТгАТГБТ░ЈТ░┤Т▓њТ▓АТ┤ЌТ┤╗Т┤ЙТИЕТИгТ║љТ║ФТ╝ЈТй«Т┐ђТ┐ЋуЂ»уѓ║уёАуЁЎуЁДує▒уЄѕуЄЦуЅЕуІђујёуј░уЈЙуЊдућеуЎ╝уџёуЏъуЏ«уЮђуЮАуДЂуЕ║уфЌуФІугЏу«Ау»ђу░Йу▒гу┤Ёуиџу║буйљуй«УЂџУЂ▓УёџУЁдУЁ│УЄЦУЅ▓УіѓУЉЌУАїУАБУДБУеГУф┐УФІУгЮУГдУ«ЙУ░ЃУх░Уи»У╗іУйдУ┐љжђБжЂіжЂІжЂјжЂЊжѓіжЃежЃйжЄЈжјќжћЂжќђжќѓжќЅжќІжЌюжЌежЌГжЎцжџ▒жЏбжЏ╗жюЄжюДжЮбжЪ│жаѓжАїжАЈжбюжбежБјжБЪжцЁжцхЖ░ђЖ░ёЖ░љЖ░ћЖ░ЋЖ░юЖ▒░Ж▓їЖ▓еЖ▓░Ж▓йЖ│аЖ│хЖ│╝Ж┤ђЖиИЖИѕЖИЅЖИ░ЖИИЖ╣ЦЖ║╝Ж╗љЖ╝йвѓўвѓювѓ┤вёцвєђвѕёвіћвіЦвІѕвІцвІФвІ┤вїђвЇћвЇ░вЈёвЈЎвљљвљўвљювљевЉАвЊювЊавЊ▒вћћвЋївќцвюевЮ╝въўвЪгваЄваївацвАювБївЦИвЦ